name: 'SMSPY Automation CI'

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  test:
    name: 'Run Automation Tests'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Tests
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          BRYAN1_PASSWORD: ${{ secrets.BRYAN1_PASSWORD }}
          BRYAN2_PASSWORD: ${{ secrets.BRYAN2_PASSWORD }}
          JOHN_DOE_PASSWORD: ${{ secrets.JOHN_DOE_PASSWORD }}
          BRYAN_GUERRA_PASSWORD: ${{ secrets.BRYAN_GUERRA_PASSWORD }}
          SMSPY_TEST_USER_PASSWORD: ${{ secrets.SMSPY_TEST_USER_PASSWORD }}
          GENERAL_PASSWORD: ${{ secrets.GENERAL_PASSWORD }}
          STAGING_BRYAN1_PASSWORD: ${{ secrets.STAGING_BRYAN1_PASSWORD }}
        run: |
          mvn clean test -Dbrowser.headless=true \
            -Ddb.url=$DB_URL \
            -Ddb.user=$DB_USER \
            -Ddb.password=$DB_PASSWORD \
            -Dtest.user.bryan1.password=$BRYAN1_PASSWORD \
            -Dtest.user.bryan2.password=$BRYAN2_PASSWORD \
            -Dtest.user.John_Doe.password=$JOHN_DOE_PASSWORD \
            -Dtest.user.Bryan_Guerra.password=$BRYAN_GUERRA_PASSWORD \
            -Dtest.user.smspy_test_user.password=$SMSPY_TEST_USER_PASSWORD \
            -Dtest.user.general.password=$GENERAL_PASSWORD \
            -Dstaging.bryan1.password=$STAGING_BRYAN1_PASSWORD

      - name: Get Allure History
        uses: actions/checkout@v4
        continue-on-error: true
        if: always()
        with:
          ref: gh-pages
          path: gh-pages

      - name: Merge Allure Results
        if: always()
        run: |
          mkdir -p allure-results
          [ -d API_Testing/target/allure-results ] && cp -r API_Testing/target/allure-results/* allure-results/ || echo "No API results"
          [ -d UI_Testing/target/allure-results ] && cp -r UI_Testing/target/allure-results/* allure-results/ || echo "No UI results"
          [ -d gh-pages/allure-history ] && cp -r gh-pages/allure-history/* allure-results/ || echo "No previous history"

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20
          generate_only: true

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          force_orphan: true

      - name: Upload Artifacts on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: allure-results
          path: |
            API_Testing/target/allure-results
            UI_Testing/target/allure-results
          retention-days: 5