name: 'SMSPY Automation CI'

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  test:
    name: 'Run Automation Tests'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Tests
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: mvn clean test -Dbrowser.headless=true -DDB_PASSWORD=$DB_PASSWORD -DAPI_TOKEN=$API_TOKEN

      - name: Get Allure History
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Merge Allure Results
        if: always()
        run: |
          mkdir -p allure-results
          [ -d API_Testing/target/allure-results ] && cp -r API_Testing/target/allure-results/* allure-results/ || echo "No API results"
          [ -d UI_Testing/target/allure-results ] && cp -r UI_Testing/target/allure-results/* allure-results/ || echo "No UI results"

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Upload Artifacts on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: allure-results
          path: |
            API_Testing/target/allure-results
            UI_Testing/target/allure-results
          retention-days: 5
